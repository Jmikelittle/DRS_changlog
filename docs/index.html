<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DRS Changelog</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .dataset { margin-bottom: 40px; border: 1px solid #ddd; padding: 20px; }
        h1 { color: #333; }
        h2 { color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Data Reference Standard Changelogs</h1>
    <p>Tracking changes to Government of Canada reference datasets</p>
    <div id="content">Loading...</div>
    
    <script>
        async function loadChangelogs() {
            const owner = 'Jmikelittle';
            const repo = 'DRS_changlog';
            
            try {
                // Fetch all CSV files from the repo
                const response = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/contents`
                );
                const files = await response.json();
                
                // Filter for CSV files (changelogs)
                const csvFiles = files.filter(f => f.name.endsWith('.csv'));
                
                if (csvFiles.length === 0) {
                    document.getElementById('content').innerHTML = 
                        '<p>No changelogs available yet. Check back soon!</p>';
                    return;
                }
                
                let html = '';
                
                // Load and display each changelog
                for (const file of csvFiles) {
                    const contentResponse = await fetch(file.download_url);
                    const csv = await contentResponse.text();
                    const rows = csv.trim().split('\n').map(line => line.split(','));
                    
                    // Take only the 10 most recent (skip header)
                    const recent = rows.slice(0, Math.min(11, rows.length));
                    
                    html += `<div class="dataset">
                        <h2>${file.name.replace('.csv', '')}</h2>
                        <table>
                            <thead>
                                <tr>${recent[0].map(h => `<th>${h}</th>`).join('')}</tr>
                            </thead>
                            <tbody>
                                ${recent.slice(1).map(row => 
                                    `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`
                                ).join('')}
                            </tbody>
                        </table>
                    </div>`;
                }
                
                document.getElementById('content').innerHTML = html;
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<p>Error loading changelogs: ${error.message}</p>`;
            }
        }
        
        loadChangelogs();
    </script>
</body>
</html>
