            </div>

    <script>
        let currentLanguage = 'en';
        let metadata = null;
        
        async function loadMetadata() {
            try {
                const response = await fetch('./metadata.json');
                metadata = await response.json();
            } catch (err) {
                console.error('Error loading metadata:', err);
                metadata = { datasets: {}, ui_text: {} };
            }
        }
        
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const result = [];
            
            for (let i = 0; i < lines.length; i++) {
                const obj = {};
                let current = '';
                let insideQuotes = false;
                let fieldIndex = 0;
                
                const line = lines[i];
                const fields = [];
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (insideQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            insideQuotes = !insideQuotes;
                        }
                    } else if (char === ',' && !insideQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (i === 0) {
                    result.headers = fields;
                } else if (fields.some(f => f.trim())) {
                    const row = {};
                    result.headers.forEach((h, idx) => {
                        row[h] = (fields[idx] || '').replace(/^"|"$/g, '').trim();
                    });
                    result.push(row);
                }
            }
            
            return result;
        }
        
        function getEventClass(event) {
            return `event-${event.toUpperCase()}`;
        }
        
        function getText(key) {
            if (!metadata || !metadata.ui_text) return key;
            
            // First try direct lookup with language suffix (for flat structure like "title_en")
            const langSuffixKey = `${key}_${currentLanguage}`;
            if (metadata.ui_text[langSuffixKey]) {
                return metadata.ui_text[langSuffixKey];
            }
            
            // Then handle nested keys like "table_headers.date" 
            if (key.includes('.')) {
                const parts = key.split('.');
                const lastPart = parts[parts.length - 1];
                const pathParts = parts.slice(0, -1);
                
                // Navigate through path parts (all except last)
                let current = metadata.ui_text;
                for (const part of pathParts) {
                    if (current && typeof current === 'object') {
                        current = current[part];
                    } else {
                        return key;
                    }
                }
                
                // Now look for language key using last part + language suffix
                if (current && typeof current === 'object') {
                    const langKey = `${lastPart}_${currentLanguage}`;
                    if (current[langKey]) {
                        return current[langKey];
                    }
                    // Fallback to English
                    const enKey = `${lastPart}_en`;
                    if (current[enKey]) {
                        return current[enKey];
                    }
                }
            }
            
            return key;
        }
        
        function getDatasetName(datasetFilename) {
            const datasetKey = datasetFilename.replace('_changelog.csv', '');
            if (metadata && metadata.datasets && metadata.datasets[datasetKey]) {
                return metadata.datasets[datasetKey][`name_${currentLanguage}`];
            }
            return datasetKey.replace(/_/g, ' ');
        }
        
        function getFieldLabel(datasetFilename, fieldName) {
            const datasetKey = datasetFilename.replace('_changelog.csv', '');
            if (metadata && metadata.datasets && metadata.datasets[datasetKey] && metadata.datasets[datasetKey].fields) {
                const fieldData = metadata.datasets[datasetKey].fields[fieldName];
                if (fieldData) {
                    return fieldData[currentLanguage] || fieldName;
                }
            }
            return fieldName;
        }
        
        function getEntityNameFieldForDataset(datasetKey) {
            if (metadata && metadata.entity_name_fields && metadata.entity_name_fields[datasetKey]) {
                return metadata.entity_name_fields[datasetKey][currentLanguage];
            }
            return null;
        }
        
        function getFieldVariants(datasetKey) {
            if (metadata && metadata.language_variants && metadata.language_variants[datasetKey]) {
                return metadata.language_variants[datasetKey];
            }
            return {};
        }
        
        function shouldSkipField(datasetKey, fieldName) {
            const variants = getFieldVariants(datasetKey);
            // Skip if this field is a FR variant of an EN field
            for (const [enField, frField] of Object.entries(variants)) {
                if (currentLanguage === 'en' && fieldName === frField) {
                    return true;
                }
                if (currentLanguage === 'fr' && fieldName === enField) {
                    return true;
                }
            }
            return false;
        }
        
        function getActualFieldName(datasetKey, displayFieldName) {
            const variants = getFieldVariants(datasetKey);
            // If we're in FR mode and this is an EN field with a FR variant, return the FR variant
            if (currentLanguage === 'fr' && variants[displayFieldName]) {
                return variants[displayFieldName];
            }
            return displayFieldName;
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-fr').classList.toggle('active', lang === 'fr');
            
            document.getElementById('title').textContent = getText('title');
            document.getElementById('subtitle').textContent = getText('subtitle');
            
            loadChangelogsFromEmbedded();
        }
        
        function getEventLabel(event) {
            const eventLower = event.toLowerCase();
            if (eventLower === 'added') return currentLanguage === 'en' ? 'ADDED' : 'AJOUTÉ';
            if (eventLower === 'deleted') return currentLanguage === 'en' ? 'DELETED' : 'SUPPRIMÉ';
            if (eventLower === 'updated') return currentLanguage === 'en' ? 'UPDATED' : 'MODIFIÉ';
            return event;
        }

        function loadChangelogsFromEmbedded() {
            const owner = 'Jmikelittle';
            const repo = 'DRS_changlog';
            
            let html = '';
            
            for (const [filename, csvContent] of Object.entries(embeddedChangelogs)) {
                const data = parseCSV(csvContent);
                
                if (data.length === 0) {
                    continue;
                }
                
                const datasetName = getDatasetName(filename);
                const viewUrl = `https://github.com/${owner}/${repo}/blob/main/changelogs/${filename}`;
                const downloadUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/changelogs/${filename}`;
                
                const recent = data.slice(Math.max(0, data.length - 50)).reverse();
                
                const datasetKey = filename.replace('_changelog.csv', '');
                
                html += `<div class="dataset">
                    <div class="dataset-header">
                        <h2>${datasetName}</h2>
                        <div class="dataset-links">
                            <a href="${viewUrl}" target="_blank" class="dataset-link-btn view-btn">${getText('view_on_github')}</a>
                            <a href="${downloadUrl}" download class="dataset-link-btn">${getText('raw_csv')}</a>
                        </div>
                    </div>`;
                
                if (recent.length === 0) {
                    html += `<p class="no-changes">${getText('no_changes')}</p>`;
                } else {
                    html += `<div class="scrollable-table-wrapper" style="max-height: 500px;">
                        <table>
                            <thead>
                                <tr>
                                    <th>${getText('table_headers.date')}</th>
                                    <th>${getText('table_headers.event')}</th>
                                    <th>${getText('table_headers.id')}</th>
                                    <th>${getText('table_headers.entity_name')}</th>
                                    <th>${getText('table_headers.field')}</th>
                                    <th>${getText('table_headers.old_value')}</th>
                                    <th>${getText('table_headers.new_value')}</th>
                                </tr>
                            </thead>
                            <tbody>`;
                    
                    for (const row of recent) {
                        const event = row.event || '';
                        const eventClass = getEventClass(event);
                        const eventLabel = getEventLabel(event);
                        const entityName = currentLanguage === 'en' 
                            ? (row.entity_name_en || row.entity_name || '') 
                            : (row.entity_name_fr || row.entity_name || '');
                        
                        html += `<tr>
                            <td>${row.date || ''}</td>
                            <td><span class="${eventClass}">${eventLabel}</span></td>
                            <td>${row.id || ''}</td>
                            <td>${entityName || '-'}</td>
                            <td>${row.field || '-'}</td>
                            <td><code>${(row.old_value || '').substring(0, 100)}</code></td>
                            <td><code>${(row.new_value || '').substring(0, 100)}</code></td>
                        </tr>`;
                    }
                    
                    html += `</tbody>
                        </table>
                    </div>`;
                }
                
                html += `</div>`;
            }
            
            if (!html) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">${getText('error_loading')} No changelog data found.</div>`;
            } else {
                document.getElementById('content').innerHTML = html;
            }
        }
        
        async function init() {
            await loadMetadata();
            loadChangelogsFromEmbedded();
        }
        
        init();
    </script>
